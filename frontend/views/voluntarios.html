<div class="panels">
  <!-- VIEW VOLUNTÁRIOS -->
  <div id="view-voluntarios" class="view-section" style="display:none;">
    <div class="view-header">
      <div class="view-title">Voluntários e Lares Temporários</div>
      <div class="view-actions">
        <select id="filter-vol-status" onchange="filterVoluntarios()" class="filter-select">
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="em_analise">Em Análise</option>
          <option value="aprovado">Aprovado</option>
          <option value="aguardando_correcao">Aguardando Correção</option>
          <option value="reprovado">Reprovado</option>
        </select>
      </div>
    </div>
    <div class="table-wrapper">
      <div style="overflow-x:auto;">
        <table class="animals-table">
          <thead>
            <tr>
              <th>NOME</th>
              <th>CPF</th>
              <th>MORADIA</th>
              <th>STATUS</th>
              <th>DOCS</th>
              <th>AÇÕES</th>
            </tr>
          </thead>
          <tbody id="table-voluntarios-body">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL VALIDAÇÃO VOLUNTÁRIO -->
  <div id="modal-voluntario" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="panel-header">
        <h3>Validação de Voluntário</h3>
        <button class="modal-close" onclick="closeModalVoluntario()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-section-title">// Identificação</div>
        <div id="voluntario-info"></div>

        <div class="checklist">
          <div class="form-section-title">// Documentos</div>

          <label class="toggle-row"><span>RG</span><input type="checkbox" id="check-rg"></label>
          <label class="toggle-row"><span>Comprovante de Residência</span><input type="checkbox" id="check-comprovante"></label>
          <label class="toggle-row"><span>Certidão de Antecedentes</span><input type="checkbox" id="check-antecedentes"></label>
          <label class="toggle-row"><span>Investigação</span><input type="checkbox" id="check-investigacao"></label>
        </div>
        <div class="form-group">
          <div class="form-section-title">// Motivo de Reprovação (Se aplicavel)</div>
          <textarea id="motivo-reprovacao" placeholder="Explique o motivo..." class="form-textarea"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModalVoluntario()">Cancelar</button>
        <button class="btn-danger" onclick="validarVoluntario('reprovar')">Reprovar</button>
        <button class="btn-warning" onclick="validarVoluntario('aguardando_correcao')">Aguardando Correção</button>
        <button class="btn-success" onclick="validarVoluntario('aprovar')">Aprovar</button>
      </div>
    </div>
  </div>

</div>
