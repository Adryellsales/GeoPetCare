<!-- VIEW TRANSPARÊNCIA -->
<div id="view-transparencia" class="view-section" style="display:none;">
  <div class="view-header">
    <div class="view-title">Painel de Transparência</div>
  </div>
    <div class="stats-row"
      style="grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">🏠</span></div>
        <div class="stat-num" id="transp-ativos">0</div>
        <div class="stat-label">Animais na sede</div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">🎯</span></div>
        <div class="stat-num" id="transp-disponiveis">0</div>
        <div class="stat-label">Disponíveis</div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">💰</span></div>
        <div class="stat-num" id="transp-arrecadado-mes">R$ 0,00</div>
        <div class="stat-label">Arrecadado este mês</div>
      </div>
    </div>
    <div class="stats-row" style="grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem;">
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">✨</span></div>
        <div class="stat-num" id="transp-adotados">0</div>
        <div class="stat-label">Total adotados</div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">⏳</span></div>
        <div class="stat-num" id="transp-invisiveis">0</div>
        <div class="stat-label">Cachorros invisíveis</div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">🤝</span></div>
        <div class="stat-num" id="transp-lares-ativos">0</div>
        <div class="stat-label">Lares aprovados</div>
      </div>
    </div>
  </div>
